---
- name: Install voctomix & related packages
  ansible.builtin.apt:
    update_cache: yes
    name:
      # - voctomix
      # - voctomix-outcasts
      - gstreamer1.0-libcamera
      - libcamera-ipa
      - gstreamer1.0-libav
      - gstreamer1.0-alsa
      # - gstreamer1.0-pulseaudio
      # - gstreamer1.0-pipewire
      # - gstreamer1.0-gl
      - systemd
      - vim
      - python3-libcamera
      - intel-media-va-driver-non-free
      - gstreamer1.0-vaapi
      - pipewire-bin

- name: Create voctomix config dir
  ansible.builtin.file:
    path: /etc/voctomix
    state: directory

- name: Configure voctomix
  ansible.builtin.template:
    src: "templates/etc/{{ item }}.j2"
    dest: "/etc/voctomix/{{ item }}"
  with_items:
    - voctocore.ini
    - voctogui.ini
    - vocto.cmds
  tags:
    - vocto
    - ini

- name: Create recording directory
  ansible.builtin.file:
    state: directory
    dest: "/srv/video/{{ org }}/{{ show }}/dv/{{ room_name }}"
    recurse: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  tags:
    - room_name

- name: Push the static scripts
  ansible.builtin.copy:
    src: "files/systemd/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
  with_items:
    # - videoteam-local-monitor-video.sh
    # - videoteam-local-monitor-audio.sh
    - videoteam-stream-youtube.sh
  tags:
    - youtube
    - systemd

- name: Script to copy raw video files somewhere
  ansible.builtin.template:
    src: templates/systemd/videoteam-copy-recordings.j2
    dest: /usr/local/bin/videoteam-copy-recordings
    mode: "0755"
  tags:
    - room_name

- name: Install voctomix systemd units
  ansible.builtin.template:
    src: "templates/systemd/{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
  with_items:
    - videoteam-voctocore.service
    - videoteam-voctocore-cmds.service

    - voctomix2-voctogui.service

    - videoteam-cutlist.service
    - videoteam-record.service

    - videoteam-stream-youtube.service

  notify: Systemd-reload
  tags:
    - systemd
    - youtube
    - room_name

- name: Enable voctomix systemd units
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
  with_items:
    - videoteam-voctocore.service
    - videoteam-voctocore-cmds.service
    - videoteam-record.service
    - videoteam-cutlist.service
# - videoteam-local-monitor-audio.service
    - videoteam-stream-youtube.service
  tags:
    - youtube
    - systemd
    - room_name
  when: true

- name: Start voctomix systemd units
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    daemon_reload: true
  with_items:
    - videoteam-voctocore.service
    - videoteam-voctocore-cmds.service
    - videoteam-record.service
    - videoteam-cutlist.service
#   - videoteam-local-monitor-audio.service
    - videoteam-stream-youtube.service
  when: false
  tags:
    - youtube
    - systemd
    - room_name

- name: Install voctomix video monitor script
  ansible.builtin.template:
    src: "templates/systemd/{{ item }}.j2"
    dest: "/etc/systemd/user/{{ item }}"
  with_items:
    - videoteam-local-monitor-video.service
  notify: Systemd-reload
  when: false

- name: Enable voctomix video systemd units
  become: true
  become_user: "{{ user_name }}"
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    scope: user
    enabled: true
  with_items:
    - videoteam-local-monitor-video.service
  tags:
    - test_one_voc
    - systemd
  when: false

- name: Start voctomix video systemd units
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    scope: user
    state: started
    daemon_reload: true
  with_items:
    - videoteam-local-monitor-video.service
  tags:
    - systemd
  when: false

