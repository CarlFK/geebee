---

- name: Add a kernel parameter to GRUB_CMDLINE_LINUX
  ansible.builtin.replace:
      path: /etc/default/grub
      regexp: '(^GRUB_CMDLINE_LINUX=".*)"'
      replace: '\1 acpi_enforce_resources=lax"'
  tags:
    - grub

- name: Add a kernel parameter to GRUB_CMDLINE_LINUX
  ansible.builtin.replace:
      path: /etc/default/grub
      regexp: '(^GRUB_CMDLINE_LINUX=".*)"'
      replace: '\1 fbcon=font:TER16x32"'
  tags:
    - grub

- name: Add a kernel parameters to GRUB_CMDLINE_LINUX
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    state: present
    regexp: '(^GRUB_CMDLINE_LINUX=".*)"'
    line: 'GRUB_CMDLINE_LINUX="acpi_enforce_resources=lax fbcon=font:TER16x32"'
  tags:
    - grub

- name: set grub display mode text
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    state: present
    regexp: '^GRUB_GFXPAYLOAD_LINUX='
    line: 'GRUB_GFXPAYLOAD_LINUX=text'
  tags:
    - grub

- name: set grub display mode 640x480
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    state: present
    regexp: '^GRUB_GFXMODE='
    line: 'GRUB_GFXMODE=640x480'
  tags:
    - grub


- name: Update GRUB configuration
  ansible.builtin.command: update-grub
  tags:
    - grub
